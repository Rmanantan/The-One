<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The-One | Personal Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            font-size: 70px;
            color: white;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .title {
            color: #a78bfa;
            font-size: 1.1em;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .bio {
            color: #d1d5db;
            font-size: 1em;
            line-height: 1.8;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 20px auto;
            border-radius: 10px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .social-links a {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9em;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-links a:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .skills span {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 15px;
            border-radius: 20px;
            color: #c4b5fd;
            font-size: 0.8em;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer {
            margin-top: 30px;
            color: #6b7280;
            font-size: 0.8em;
        }

        .footer a {
            color: #8b5cf6;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2em;
            }
            .avatar {
                width: 120px;
                height: 120px;
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Avatar / Profile Picture -->
        <div class="avatar">👨‍💻</div>

        <!-- Name -->
        <h1>Rmanantan</h1>
        <div class="title">✨ Full-Stack Developer &amp; Creator</div>

        <div class="divider"></div>

        <!-- Bio -->
        <div class="bio">
            🚀 Building cool stuff with code.<br>
            💡 Passionate about AI, Web Dev, and Open Source.<br>
            🌱 Currently learning more about Cloud &amp; DevOps.
        </div>

        <div class="divider"></div>

        <!-- Social Links -->
        <div class="social-links">
            <a href="#">🐙 GitHub</a>
            <a href="#">🐦 Twitter</a>
            <a href="#">💼 LinkedIn</a>
            <a href="#">📧 Email</a>
        </div>

        <!-- Skills / Tech Stack -->
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>React</span>
            <span>Python</span>
        </div>

        <!-- Footer -->
        <div class="footer">
            ⚡ Built with ❤️ using GitHub Pages<br>
            &copy; 2026 <a href="#">The-One</a>
        </div>
    </div>
</body>
</html>
